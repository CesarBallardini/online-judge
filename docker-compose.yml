x-site-environment: &site-env
  MYSQL_HOST: db
  MYSQL_PORT: "3306"
  MYSQL_DATABASE: ${MYSQL_DATABASE:-dmoj}
  MYSQL_USER: ${MYSQL_USER:-dmoj}
  MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dmoj_password}
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  SECRET_KEY: ${SECRET_KEY:-change_this_secret_key_in_production}
  ALLOWED_HOSTS: ${HOST_IP:-localhost},localhost,127.0.0.1
  TIME_ZONE: ${TIME_ZONE:-UTC}
  SITE_URL: http://${HOST_IP:-localhost}
  DEBUG: ${DEBUG:-False}
  JUDGE_NAME: ${JUDGE_NAME:-paradigmas}
  JUDGE_KEY: ${JUDGE_KEY:-}
  DJANGO_SETTINGS_MODULE: dmoj.docker_settings

services:
  # Database (MariaDB)
  db:
    container_name: dmoj_db
    image: mariadb:10.5
    restart: unless-stopped
    volumes:
      - dmoj_database:/var/lib/mysql/
      - ./config/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      - ./mariadb/init:/docker-entrypoint-initdb.d/:ro
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-mysql_root_pass}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-dmoj}
      - MYSQL_USER=${MYSQL_USER:-dmoj}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-dmoj_password}
    networks:
      - dmoj_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 5

  # Redis cache
  redis:
    container_name: dmoj_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - dmoj_redis_data:/data
    networks:
      - dmoj_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DMOJ Site (Django)
  site:
    container_name: dmoj_site
    build:
      context: ./site
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - ./data/media:/site/media/
      - ./data/static:/site/static/
      - ./data/log:/site/log/
      - ./data/problems:/site/problems/
      - ./data/cache:/tmp/dmoj_cache/
    ports:
      - "8080:8080"
    environment:
      <<: *site-env
      RUN_MIGRATIONS: "true"
    networks:
      - dmoj_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Celery worker (background tasks)
  worker:
    container_name: dmoj_worker
    build:
      context: ./site
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A dmoj_celery worker -l info --without-gossip
    volumes:
      - ./data/media:/site/media/
      - ./data/problems:/site/problems/
      - ./data/cache:/tmp/dmoj_cache/
      - ./data/log:/site/log/
    environment:
      <<: *site-env
      RUN_MIGRATIONS: "false"
    networks:
      - dmoj_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Bridge (judge <-> site communication)
  bridged:
    container_name: dmoj_bridged
    build:
      context: ./site
      dockerfile: Dockerfile
    restart: unless-stopped
    command: python manage.py runbridged
    volumes:
      - ./data/problems:/site/problems/
      - ./data/log:/site/log/
    ports:
      - "9999:9999"
      - "9998:9998"
    environment:
      <<: *site-env
      RUN_MIGRATIONS: "false"
    networks:
      - dmoj_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Judge (code execution)
  judge:
    container_name: dmoj_judge
    build:
      context: ./judge
      dockerfile: Dockerfile
    restart: unless-stopped
    privileged: true
    volumes:
      - ./data/problems:/problems:ro
      - ./data/judge_cache:/tmp/judge_cache/
    environment:
      - JUDGE_KEY=${JUDGE_KEY:-change_this_judge_key}
      - JUDGE_NAME=${JUDGE_NAME:-default-judge}
    networks:
      - dmoj_network
    depends_on:
      bridged:
        condition: service_started

  # Nginx reverse proxy
  nginx:
    container_name: dmoj_nginx
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./data/media:/site/media/:ro
      - ./data/static:/site/static/:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - dmoj_network
    depends_on:
      site:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  dmoj_database:
    driver: local
  dmoj_redis_data:
    driver: local

networks:
  dmoj_network:
    driver: bridge
